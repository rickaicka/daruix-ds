<div
  [class]="cardClasses()"
  [style.--module-color]="moduloColor()"
>
  @if (title()) {
    <div class="card-title-wrapper">
      <app-hub-icon [name]="icon()" />
      <div class="card-content">
        <strong class="card-title drx-font-family-heading">
          <span class=" drx-button--font-gothic drx-card--title-sm">
            {{ title() }}
          </span>
        </strong>
        @if(platform().length > 0){
          <div class="chip-platform-wrapper">
            @for (plat of platform();track $index){
              <div class="chip-item">
                <span class="drx-button--font-quicksand">{{plat}}</span>
              </div>
            }
          </div>
        }

        @if (description()) {
          <p class="card-description drx-card--body-md">
            {{ description() }}
          </p>
        }
      </div>
      @if (favoritable()) {
        <button
          type="button"
          class="card-favorite"
          [class.card-favorite--active]="favorite()"
          [attr.aria-pressed]="favorite()"
          [attr.aria-label]="
      favorite()
        ? 'Remover dos favoritos'
        : 'Adicionar aos favoritos'
    "
          [title]="
      favorite()
        ? 'Remover dos favoritos'
        : 'Adicionar aos favoritos'
    "
          (click)="onFavoriteClick($event)"
        >
          <app-hub-icon
            name="favorito"
            action
            [class.is-filled]="favorite()"
          />
        </button>
      }
      @if (navigable()) {
        <button
          type="button"
          class="card-navigation"
          aria-label="Abrir"
          title="Abrir"
          (click)="onNavigateClick($event)"
        >
          <app-hub-icon
            name="chevron-right"
            action
          />
        </button>
      }
    </div>
  } @else {
    <ng-content />
  }
</div>
